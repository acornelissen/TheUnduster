name: Feature request
description: Suggest an idea or a workflow improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Describing the problem you're trying to solve helps
        as much as the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What does your current workflow look like, and where does it fall short?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
