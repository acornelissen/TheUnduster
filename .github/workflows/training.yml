name: training

on:
  push:
    paths:
      - "training/**"
      - ".github/workflows/training.yml"
  pull_request:
    paths:
      - "training/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest -v
